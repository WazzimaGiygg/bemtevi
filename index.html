<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bemtevi - Rede Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="https://gspotfverwazzimagiygg.wazzimagiygg.com/bemtevi/Favicom.png" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Layout Principal */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 20px;
            padding: 20px;
            min-height: 100vh;
        }

        /* Sidebar Esquerda */
        .sidebar-left {
            background: white;
            border-radius: 20px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .logo-icon {
            font-size: 32px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-menu {
            list-style: none;
            margin-bottom: 30px;
        }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .nav-item:hover {
            background: #f5f5f5;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .nav-item.active .material-icons {
            color: white;
        }

        .nav-item .material-icons {
            color: #667eea;
        }

        /* Perfil Sidebar */
        .user-profile-mini {
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
            margin-top: 20px;
            cursor: pointer;
        }

        .user-profile-mini:hover {
            opacity: 0.8;
        }

        .user-avatar-mini {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
        }

        /* Feed Principal */
        .main-feed {
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }

        .feed-header {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            background: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .feed-title {
            font-size: 20px;
            font-weight: 700;
        }

        /* Postagem */
        .post-box {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .post-input-area {
            display: flex;
            gap: 15px;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
            cursor: pointer;
        }

        .post-input-container {
            flex: 1;
        }

        .post-input {
            width: 100%;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            padding: 15px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            resize: none;
            transition: all 0.3s;
        }

        .post-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .char-counter {
            text-align: right;
            font-size: 12px;
            margin-top: 8px;
            color: #999;
        }

        .char-counter.warning {
            color: #ff9800;
        }

        .char-counter.danger {
            color: #f44336;
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .post-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .post-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .post-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }

        .post-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .attach-link-btn, .category-select {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .attach-link-btn.active {
            background: #667eea;
            color: white;
        }

        /* Posts */
        .posts-container {
            min-height: 500px;
        }

        .post-card {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .post-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .post-avatar-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
            cursor: pointer;
        }

        .post-user-info {
            flex: 1;
            cursor: pointer;
        }

        .post-user-name {
            font-weight: 700;
            color: #1a1a2e;
        }

        .post-user-id {
            font-size: 13px;
            color: #999;
            margin-left: 8px;
        }

        .post-time {
            font-size: 12px;
            color: #999;
        }

        .post-content {
            margin-bottom: 12px;
            padding-left: 60px;
            font-size: 15px;
            line-height: 1.5;
            color: #333;
        }

        .post-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 13px;
            color: #667eea;
            text-decoration: none;
        }

        .post-link:hover {
            background: #e8e8e8;
        }

        .post-category {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
            margin-left: 60px;
        }

        .post-stats {
            display: flex;
            gap: 20px;
            padding-left: 60px;
            margin-top: 12px;
        }

        .stat-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stat-action:hover {
            color: #667eea;
        }

        .stat-action.liked {
            color: #e94560;
        }

        /* Sidebar Direita */
        .sidebar-right {
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .trending-box, .categories-box, .suggestions-box {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .box-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .category-chip {
            display: inline-block;
            padding: 6px 14px;
            background: #f0f0f0;
            border-radius: 20px;
            margin: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-chip:hover {
            background: #667eea;
            color: white;
        }

        .category-chip.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
        }

        .modal-body {
            padding: 20px;
        }

        .close-modal {
            cursor: pointer;
            font-size: 24px;
        }

        /* Perfil */
        .profile-header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
        }

        .follow-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .follow-btn.following {
            background: #e94560;
            color: white;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
        }

        /* Comentários */
        .comment-item {
            display: flex;
            gap: 12px;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-name {
            font-weight: 600;
            font-size: 13px;
        }

        .comment-text {
            font-size: 14px;
            margin-top: 4px;
        }

        .comment-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }

        .comment-input {
            width: 100%;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            padding: 10px 15px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: none;
            margin-top: 15px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Sugestões */
        .suggestion-user {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .suggestion-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .suggestion-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .follow-small-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            .sidebar-left, .sidebar-right {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Configuração Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Estado Global
        let currentUser = null;
        let currentFeed = 'for-you';
        let lastDoc = null;
        let loading = false;
        let hasMore = true;
        let currentCategoryFilter = null;
        let currentViewingProfile = null;

        // Categorias disponíveis
        const categories = [
            'Geral', 'Tecnologia', 'Ciência', 'Arte', 'Música',
            'Esportes', 'Games', 'Educação', 'Política', 'Entretenimento'
        ];

        // Tópicos Especiais
        const specialTopics = {
            'AnúncioOficial': { icon: '📢', color: '#ff9800' },
            'Urgente': { icon: '⚠️', color: '#f44336' },
            'Comunicado': { icon: '📣', color: '#2196f3' },
            'Dica': { icon: '💡', color: '#4caf50' }
        };

        // Palavras bloqueadas
        const blockedTopics = ['spam', 'porn', 'violencia', 'odio', 'discriminacao', 'racismo', 'nazismo'];

        // ============================================
        // FUNÇÕES DE VALIDAÇÃO
        // ============================================

        function containsBlockedContent(text) {
            const lowerText = text.toLowerCase();
            return blockedTopics.some(topic => lowerText.includes(topic));
        }

        function extractLinks(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const matches = text.match(urlRegex);
            return matches ? matches[0] : null;
        }

        function removeLinks(text) {
            return text.replace(/(https?:\/\/[^\s]+)/g, '').trim();
        }

        // ============================================
        // FUNÇÕES DE POSTAGEM
        // ============================================

        async function createPost(conteudo, link = null, categoria = 'Geral') {
            if (!currentUser) {
                alert('Faça login para postar!');
                return false;
            }

            let postText = conteudo.trim();
            let extractedLink = link;

            if (!extractedLink) {
                extractedLink = extractLinks(postText);
                postText = removeLinks(postText);
            }

            if (postText.length > 127) {
                alert('O texto da postagem deve ter no máximo 127 caracteres!');
                return false;
            }

            if (postText.length === 0 && !extractedLink) {
                alert('Digite algo para postar!');
                return false;
            }

            if (containsBlockedContent(postText)) {
                alert('⚠️ Sua postagem contém conteúdo não permitido!');
                return false;
            }

            let topicoEspecial = null;
            for (const [key, value] of Object.entries(specialTopics)) {
                if (postText.toUpperCase().includes(key.toUpperCase())) {
                    topicoEspecial = key;
                    break;
                }
            }

            try {
                const postData = {
                    userId: currentUser.uid,
                    userNome: currentUser.displayName || currentUser.email.split('@')[0],
                    userEmail: currentUser.email,
                    userAvatar: currentUser.photoURL || null,
                    conteudo: postText.substring(0, 127),
                    categoria: categoria,
                    topicoEspecial: topicoEspecial,
                    link: extractedLink,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0,
                    comentarios: 0,
                    usuariosQueCurtiram: []
                };

                await db.collection('Bemtevi').add(postData);
                return true;
            } catch (error) {
                console.error('Erro ao postar:', error);
                alert('Erro ao postar. Tente novamente.');
                return false;
            }
        }

        // ============================================
        // LIKE
        // ============================================

        async function likePost(postId) {
            if (!currentUser) {
                alert('Faça login para curtir!');
                return;
            }

            const postRef = db.collection('Bemtevi').doc(postId);
            const postDoc = await postRef.get();
            const usuariosQueCurtiram = postDoc.data()?.usuariosQueCurtiram || [];

            if (usuariosQueCurtiram.includes(currentUser.uid)) {
                await postRef.update({
                    likes: firebase.firestore.FieldValue.increment(-1),
                    usuariosQueCurtiram: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                });
            } else {
                await postRef.update({
                    likes: firebase.firestore.FieldValue.increment(1),
                    usuariosQueCurtiram: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                });
            }

            refreshFeed();
        }

        // ============================================
        // COMENTÁRIOS
        // ============================================

        async function openComments(postId, postUserId, postUserNome) {
            currentViewingPost = { id: postId, userId: postUserId, userNome: postUserNome };
            
            const modal = document.getElementById('comments-modal');
            const container = document.getElementById('comments-container');
            container.innerHTML = '<div class="loading">Carregando comentários...</div>';
            modal.style.display = 'flex';

            // Carregar comentários
            const snapshot = await db.collection('Bemtevi').doc(postId)
                .collection('comentarios')
                .orderBy('createdAt', 'desc')
                .get();

            if (snapshot.empty) {
                container.innerHTML = '<div class="loading">Nenhum comentário ainda. Seja o primeiro!</div>';
            } else {
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const comment = doc.data();
                    const commentDate = comment.createdAt?.toDate() || new Date();
                    container.innerHTML += `
                        <div class="comment-item">
                            <div class="comment-avatar">
                                ${comment.userNome?.charAt(0).toUpperCase() || '?'}
                            </div>
                            <div class="comment-content">
                                <div class="comment-name">${escapeHtml(comment.userNome)}</div>
                                <div class="comment-text">${escapeHtml(comment.conteudo)}</div>
                                <div class="comment-time">${getTimeAgo(commentDate)}</div>
                            </div>
                        </div>
                    `;
                });
            }
        }

        async function sendComment() {
            const commentText = document.getElementById('comment-input').value.trim();
            if (!commentText) {
                alert('Digite um comentário!');
                return;
            }

            if (commentText.length > 280) {
                alert('Comentário muito longo! Máximo 280 caracteres.');
                return;
            }

            try {
                await db.collection('Bemtevi').doc(currentViewingPost.id).collection('comentarios').add({
                    userId: currentUser.uid,
                    userNome: currentUser.displayName || currentUser.email.split('@')[0],
                    conteudo: commentText,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                await db.collection('Bemtevi').doc(currentViewingPost.id).update({
                    comentarios: firebase.firestore.FieldValue.increment(1)
                });

                document.getElementById('comment-input').value = '';
                openComments(currentViewingPost.id, currentViewingPost.userId, currentViewingPost.userNome);
                refreshFeed();
            } catch (error) {
                console.error('Erro ao comentar:', error);
                alert('Erro ao enviar comentário.');
            }
        }

        // ============================================
        // PERFIL E SEGUIR
        // ============================================

        async function openProfile(userId, userName) {
            currentViewingProfile = userId;
            
            const userDoc = await db.collection('usuarios').doc(userId).get();
            const userData = userDoc.exists ? userDoc.data() : { nome: userName, seguidores: [], seguindo: [] };
            
            // Verificar se o usuário atual segue este perfil
            let isFollowing = false;
            if (currentUser && userId !== currentUser.uid) {
                const followDoc = await db.collection('usuarios').doc(currentUser.uid)
                    .collection('seguindo').doc(userId).get();
                isFollowing = followDoc.exists;
            }

            // Carregar posts do usuário
            const postsSnapshot = await db.collection('Bemtevi')
                .where('userId', '==', userId)
                .orderBy('createdAt', 'desc')
                .limit(10)
                .get();

            let postsHtml = '';
            postsSnapshot.forEach(doc => {
                const post = doc.data();
                postsHtml += `
                    <div class="post-card" style="padding:15px;">
                        <div class="post-content" style="padding-left:0">
                            ${escapeHtml(post.conteudo)}
                            ${post.link ? `<a href="${post.link}" target="_blank" class="post-link" style="margin-top:8px;">🔗 ${post.link.substring(0, 40)}</a>` : ''}
                        </div>
                        <div class="post-stats" style="padding-left:0">
                            <span>❤️ ${post.likes || 0}</span>
                            <span>💬 ${post.comentarios || 0}</span>
                        </div>
                    </div>
                `;
            });

            const modal = document.getElementById('profile-modal');
            document.getElementById('profile-content').innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">
                        ${userData.nome?.charAt(0).toUpperCase() || userName?.charAt(0).toUpperCase() || '?'}
                    </div>
                    <h3>${escapeHtml(userData.nome || userName)}</h3>
                    <div style="opacity:0.8;">@${userId.substring(0, 8)}</div>
                    ${currentUser && userId !== currentUser.uid ? `
                        <button class="follow-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow('${userId}')">
                            ${isFollowing ? '✓ Seguindo' : '+ Seguir'}
                        </button>
                    ` : ''}
                    <div class="profile-stats">
                        <div><div class="stat-number">${userData.seguidores?.length || 0}</div><div>Seguidores</div></div>
                        <div><div class="stat-number">${userData.seguindo?.length || 0}</div><div>Seguindo</div></div>
                        <div><div class="stat-number">${postsSnapshot.size}</div><div>Posts</div></div>
                    </div>
                </div>
                <h4 style="margin: 20px 0 10px;">📝 Últimas postagens</h4>
                <div id="profile-posts">${postsHtml || '<div class="loading">Nenhuma postagem ainda.</div>'}</div>
            `;
            modal.style.display = 'flex';
        }

        async function toggleFollow(userIdToFollow) {
            if (!currentUser) {
                alert('Faça login para seguir usuários!');
                return;
            }

            if (userIdToFollow === currentUser.uid) {
                alert('Você não pode seguir a si mesmo!');
                return;
            }

            const followingRef = db.collection('usuarios').doc(currentUser.uid)
                .collection('seguindo').doc(userIdToFollow);
            
            const followersRef = db.collection('usuarios').doc(userIdToFollow)
                .collection('seguidores').doc(currentUser.uid);

            const followingDoc = await followingRef.get();

            if (followingDoc.exists) {
                await followingRef.delete();
                await followersRef.delete();
            } else {
                await followingRef.set({
                    userId: userIdToFollow,
                    userName: (await db.collection('usuarios').doc(userIdToFollow).get()).data()?.nome || userIdToFollow,
                    seguidoDesde: firebase.firestore.FieldValue.serverTimestamp()
                });
                await followersRef.set({
                    userId: currentUser.uid,
                    userName: currentUser.displayName || currentUser.email.split('@')[0],
                    seguidoDesde: firebase.firestore.FieldValue.serverTimestamp()
                });
            }

            if (currentViewingProfile === userIdToFollow) {
                openProfile(userIdToFollow, '');
            }
            loadSuggestions();
            refreshFeed();
        }

        // ============================================
        // SUGESTÕES DE USUÁRIOS PARA SEGUIR
        // ============================================

        async function loadSuggestions() {
            if (!currentUser) return;

            const container = document.getElementById('suggestions-container');
            if (!container) return;

            try {
                // Buscar usuários que o currentUser já segue
                const followingSnapshot = await db.collection('usuarios').doc(currentUser.uid)
                    .collection('seguindo').get();
                const followingIds = followingSnapshot.docs.map(doc => doc.id);
                followingIds.push(currentUser.uid);

                // Buscar outros usuários
                const usersSnapshot = await db.collection('usuarios').limit(5).get();
                const suggestions = usersSnapshot.docs.filter(doc => !followingIds.includes(doc.id));

                if (suggestions.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#999;">Nenhuma sugestão no momento</div>';
                    return;
                }

                container.innerHTML = suggestions.map(doc => {
                    const userData = doc.data();
                    return `
                        <div class="suggestion-user">
                            <div class="suggestion-info" onclick="openProfile('${doc.id}', '${userData.nome}')">
                                <div class="suggestion-avatar">${userData.nome?.charAt(0).toUpperCase() || '?'}</div>
                                <div>
                                    <div style="font-weight:600; font-size:14px;">${escapeHtml(userData.nome || 'Usuário')}</div>
                                    <div style="font-size:11px; color:#999;">@${doc.id.substring(0, 8)}</div>
                                </div>
                            </div>
                            <button class="follow-small-btn" onclick="toggleFollow('${doc.id}')">Seguir</button>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Erro ao carregar sugestões:', error);
            }
        }

        // ============================================
        // CARREGAMENTO DE POSTS
        // ============================================

        async function loadPosts(reset = false) {
            if (loading) return;
            if (reset) {
                lastDoc = null;
                hasMore = true;
                document.getElementById('posts-container').innerHTML = '';
            }
            if (!hasMore) return;

            loading = true;
            showLoading();

            try {
                let query = db.collection('Bemtevi');

                if (currentFeed === 'following' && currentUser) {
                    const followingSnapshot = await db.collection('usuarios').doc(currentUser.uid)
                        .collection('seguindo').get();
                    const followingIds = followingSnapshot.docs.map(doc => doc.id);
                    
                    if (followingIds.length === 0) {
                        document.getElementById('posts-container').innerHTML = '<div class="loading">Siga outros usuários para ver postagens!</div>';
                        loading = false;
                        hideLoading();
                        return;
                    }
                    query = query.where('userId', 'in', followingIds);
                    query = query.orderBy('createdAt', 'desc');
                } else if (currentFeed === 'my-posts' && currentUser) {
                    query = query.where('userId', '==', currentUser.uid);
                    query = query.orderBy('createdAt', 'desc');
                } else if (currentCategoryFilter) {
                    query = query.where('categoria', '==', currentCategoryFilter);
                    query = query.orderBy('createdAt', 'desc');
                } else {
                    query = query.orderBy('createdAt', 'desc');
                }

                if (lastDoc) {
                    query = query.startAfter(lastDoc);
                }

                query = query.limit(20);
                const snapshot = await query.get();

                if (snapshot.empty) {
                    hasMore = false;
                    if (reset && document.getElementById('posts-container').children.length === 0) {
                        document.getElementById('posts-container').innerHTML = '<div class="loading">Nenhuma postagem encontrada!</div>';
                    }
                    loading = false;
                    hideLoading();
                    return;
                }

                lastDoc = snapshot.docs[snapshot.docs.length - 1];
                hasMore = snapshot.docs.length === 20;

                snapshot.forEach(doc => {
                    const post = { id: doc.id, ...doc.data() };
                    renderPost(post);
                });

            } catch (error) {
                console.error('Erro ao carregar posts:', error);
                if (error.message.includes('index')) {
                    document.getElementById('posts-container').innerHTML = `
                        <div class="loading">⚙️ Configurando banco de dados...<br><small>Aguarde alguns instantes e recarregue.</small></div>
                    `;
                }
            } finally {
                loading = false;
                hideLoading();
            }
        }

        function renderPost(post) {
            const container = document.getElementById('posts-container');
            if (!container) return;

            const postDate = post.createdAt?.toDate() || new Date();
            const timeAgo = getTimeAgo(postDate);
            const hasLink = post.link && post.link !== 'null';
            const isLiked = currentUser && post.usuariosQueCurtiram?.includes(currentUser.uid);
            
            let specialStyle = '';
            if (post.topicoEspecial && specialTopics[post.topicoEspecial]) {
                specialStyle = `border-left: 4px solid ${specialTopics[post.topicoEspecial].color}; padding-left: 16px;`;
            }

            const postHtml = `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="post-avatar-img" onclick="openProfile('${post.userId}', '${post.userNome}')">
                            ${post.userAvatar ? `<img src="${post.userAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : (post.userNome?.charAt(0).toUpperCase() || '?')}
                        </div>
                        <div class="post-user-info" onclick="openProfile('${post.userId}', '${post.userNome}')">
                            <span class="post-user-name">${escapeHtml(post.userNome)}</span>
                            <span class="post-user-id">@${post.userId.substring(0, 8)}</span>
                            <span class="post-time">• ${timeAgo}</span>
                        </div>
                    </div>
                    <div class="post-category" style="background:${getCategoryColor(post.categoria)}20; color:${getCategoryColor(post.categoria)};">
                        ${post.categoria}
                    </div>
                    <div class="post-content" style="${specialStyle}">
                        ${post.topicoEspecial ? `<span style="color:${specialTopics[post.topicoEspecial]?.color};">${specialTopics[post.topicoEspecial]?.icon} ${post.topicoEspecial}</span><br>` : ''}
                        ${escapeHtml(post.conteudo)}
                        ${hasLink ? `<a href="${post.link}" target="_blank" class="post-link" onclick="event.stopPropagation()">
                            <span class="material-icons" style="font-size:16px;">link</span> ${post.link.substring(0, 50)}${post.link.length > 50 ? '...' : ''}
                        </a>` : ''}
                    </div>
                    <div class="post-stats">
                        <span class="stat-action ${isLiked ? 'liked' : ''}" onclick="likePost('${post.id}')">
                            <span class="material-icons" style="font-size:18px;">${isLiked ? 'favorite' : 'favorite_border'}</span> ${post.likes || 0}
                        </span>
                        <span class="stat-action" onclick="openComments('${post.id}', '${post.userId}', '${post.userNome}')">
                            <span class="material-icons" style="font-size:18px;">chat_bubble_outline</span> ${post.comentarios || 0}
                        </span>
                        <span class="stat-action" onclick="sharePost('${post.id}')">
                            <span class="material-icons" style="font-size:18px;">share</span>
                        </span>
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', postHtml);
        }

        // ============================================
        // UTILITÁRIOS
        // ============================================

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'agora';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h`;
            const days = Math.floor(hours / 24);
            return `${days}d`;
        }

        function getCategoryColor(category) {
            const colors = {
                'Geral': '#666', 'Tecnologia': '#2196f3', 'Ciência': '#4caf50',
                'Arte': '#9c27b0', 'Música': '#f44336', 'Esportes': '#ff9800',
                'Games': '#795548', 'Educação': '#00bcd4', 'Política': '#607d8b',
                'Entretenimento': '#e91e63'
            };
            return colors[category] || '#667eea';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading() {
            const loader = document.getElementById('loading-indicator');
            if (loader) loader.style.display = 'block';
        }

        function hideLoading() {
            const loader = document.getElementById('loading-indicator');
            if (loader) loader.style.display = 'none';
        }

        function refreshFeed() {
            lastDoc = null;
            hasMore = true;
            loadPosts(true);
        }

        async function sharePost(postId) {
            const url = `${window.location.origin}/post/${postId}`;
            await navigator.clipboard.writeText(url);
            alert('Link copiado!');
        }

            currentCategoryFilter = null;

};

// Adicionar handler para quando voltar do redirect
auth.getRedirectResult().then(async (result) => {

        currentUser = result.user;
        const userDoc = await db.collection('usuarios').doc(result.user.uid).get();
        if (!userDoc.exists) {
            await db.collection('usuarios').doc(result.user.uid).set({
                nome: result.user.displayName || result.user.email.split('@')[0],

                seguidores: [],
                seguindo: []
            });

        renderMainApp();
    }
}).catch((error) => {

});
